name: Manual Deploy (SFTP Password)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Deploy via rsync over SSH (allow ssh-rsa host key)
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

          mkdir -p ~/.ssh

          # NOTE: This allows old ssh-rsa host keys from the server.
          SSH_CMD="ssh -p ${{ secrets.SFTP_PORT }} \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o HostKeyAlgorithms=+ssh-rsa \
            -o PubkeyAcceptedAlgorithms=+ssh-rsa"

          sshpass -p "${{ secrets.SFTP_PASSWORD }}" \
            rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            -e "$SSH_CMD" \
            ./ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_TARGET_DIR }}