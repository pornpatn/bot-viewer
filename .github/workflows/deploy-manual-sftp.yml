name: Manual Deploy (SFTP Password)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Deploy via SFTP (lftp mirror)
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

          lftp -u "${{ secrets.SFTP_USER }},${{ secrets.SFTP_PASSWORD }}" \
            -p ${{ secrets.SFTP_PORT }} \
            sftp://${{ secrets.SFTP_HOST }} <<EOF
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 2
          set ssl:verify-certificate no

          # Upload repo -> server folder
          mirror -R --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob .env \
            --exclude-glob .env.* \
            ./ ${{ secrets.SFTP_TARGET_DIR }}

          bye
          EOF