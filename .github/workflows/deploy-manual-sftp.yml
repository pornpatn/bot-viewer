name: Manual Deploy (SFTP Password)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/commit to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Test network + SSH
        run: |
          echo "Testing TCP to ${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_PORT }}"
          timeout 10 bash -c "</dev/tcp/${{ secrets.SFTP_HOST }}/${{ secrets.SFTP_PORT }}" && echo "Port open" || echo "Port closed"

          echo "Installing sshpass..."
          sudo apt-get update
          sudo apt-get install -y sshpass

          echo "Testing SSH login (non-interactive)..."
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" \
            ssh -p ${{ secrets.SFTP_PORT }} \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} "pwd && whoami && ls -la"

      - name: Deploy via rsync over SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PASSWORD }}" > /dev/null

          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

          sudo apt-get update
          sudo apt-get install -y sshpass

          sshpass -p "${{ secrets.SFTP_PASSWORD }}" \
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            -e "ssh -p ${{ secrets.SFTP_PORT }}" \
            ./ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:${{ secrets.SFTP_TARGET_DIR }}